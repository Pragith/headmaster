name: headmaster

services:
  headmaster:
    build: .
    container_name: headmaster
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NITRO_PORT: 41869
      NITRO_HOST: 0.0.0.0
    ports:
      - "41869:41869"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:41869/api/healthz').then((res) => { if (!res.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./.data:/workspace/.data
      - /var/run/docker.sock:/var/run/docker.sock
